services:
  laodog-bonus-claim:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laodog-bonus-claim
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BIND_ADDRESS: 0.0.0.0
    ports:
      - "0.0.0.0:${PORT:-3000}:${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/var/www/html/data
